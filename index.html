<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Generator</title>
</head>
<body>
    <h1>Certificate Generator</h1>
    <form id="certForm">
        <label>Template Image:</label><br>
        <input type="file" id="template" accept="image/*" required><br><br>
        
        <label>CSV Data File:</label><br>
        <input type="file" id="data_file" accept=".csv" required><br><br>
        
        <label>Font Path (e.g., C:/Windows/Fonts/arial.ttf):</label><br>
        <input type="text" id="font_path" value="arial.ttf" required><br><br>
        
        <label>Font Size:</label><br>
        <input type="number" id="font_size" value="30"><br><br>
        
        <label>Name X Coordinate:</label><br>
        <input type="number" id="name_x" value="100"><br><br>
        
        <label>Name Y Coordinate:</label><br>
        <input type="number" id="name_y" value="100"><br><br>
        
        <button type="submit">Generate & Download</button>
    </form>

    <script>
        document.getElementById('certForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('template', document.getElementById('template').files[0]);
            formData.append('data_file', document.getElementById('data_file').files[0]);
            formData.append('font_path', document.getElementById('font_path').value);
            formData.append('font_size', document.getElementById('font_size').value);
            formData.append('name_x', document.getElementById('name_x').value);
            formData.append('name_y', document.getElementById('name_y').value);

            const response = await fetch('/generate', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'certificates.zip';
                document.body.appendChild(a);
                a.click();
                a.remove();
            } else {
                alert('Error generating certificates');
            }
        };
    </script>
</body>
</html>
